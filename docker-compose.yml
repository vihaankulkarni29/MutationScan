services:
  mutationscan:
    build: 
      context: .
      dockerfile: Dockerfile
    image: mutationscan:v2.1
    # Map the host directories to the container so data persists and is readable
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    # Pass the working directory
    working_dir: /app
    
    # Resource limits (optional, uncomment if needed)
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '2'
    #       memory: 2G
