# MutationScan Default Configuration Manifest
# Override at runtime via: snakemake --config key="value"

# Credentials
email: "default@example.com"
api_key: ""

# Phase 1: Genomic Data (Provide input_csv OR local_genomes)
input_csv: "temp_data_collection/pure_indian_metadata.csv"
local_genomes: "" # If provided, skips Phase 1a downloads

# Phase 1 Filters (Leave blank to disable filtering)
filter_country: "India"
filter_min_year: 2015

# Phase 1b & Beyond: Extraction & References
targets_file: "config/acr_targets.txt"
uniprot_taxid: "83333" # E. coli K-12
local_refs: ""
