name: MutationScan CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    # Required for Conda environments in GitHub Actions
    defaults:
      run:
        shell: bash -el {0}

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Conda Environment
      uses: conda-incubator/setup-miniconda@v3
      with:
        activate-environment: mutationscan
        environment-file: environment.yml
        auto-activate: false           
        miniforge-variant: Miniforge3  
        use-mamba: true

    - name: Set PYTHONPATH
      run: echo "PYTHONPATH=$PWD/src" >> $GITHUB_ENV

    - name: Run Core Unit Tests
      run: |
        # Only run tests in the unit/ directory to avoid legacy integration files
        pytest tests/unit/ -v

    - name: Validate Snakemake DAG (Dry-Run)
      run: |
        # Proves the Snakemake orchestrator and dynamic routing are structurally sound
        snakemake -n --cores 1
